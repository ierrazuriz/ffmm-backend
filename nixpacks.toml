[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "expat",
  "libxcb",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "mesa",
  "libgbm",
  "alsa-lib",
  "pango",
  "cairo",
  "freetype",
  "fontconfig",
]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium",
]

[start]
cmd = "node index.js"
