<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aportes y Rescates FFMM Accionarios</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }

    header {
      background: #1a3a5c;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; flex: 1; }
    header a { color: #aed9f0; font-size: 0.8rem; text-decoration: none; }
    header a:hover { color: white; }

    .controls {
      background: white;
      padding: 16px 24px;
      border-bottom: 1px solid #ddd;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .controls label { font-size: 0.9rem; font-weight: 500; }
    .controls input[type="date"] {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
    }
    .controls select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      min-width: 200px;
    }
    .controls input[type="text"] {
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 0.9rem;
      min-width: 180px;
    }

    button {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .btn-primary { background: #1a3a5c; color: white; }
    .btn-primary:hover { background: #254d7a; }
    .btn-secondary { background: #e0e0e0; color: #333; }
    .btn-secondary:hover { background: #ccc; }
    .btn-warning { background: #e67e22; color: white; }
    .btn-warning:hover { background: #cf6d17; }

    .status-bar {
      padding: 8px 24px;
      background: #eaf4fb;
      border-bottom: 1px solid #c8e6f5;
      font-size: 0.82rem;
      color: #555;
      min-height: 32px;
    }
    .status-bar.loading { background: #fff8e1; border-color: #ffe082; }
    .status-bar.error { background: #fdecea; border-color: #f5c6cb; color: #c0392b; }

    .summary {
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }
    .summary-card {
      background: white;
      border-radius: 8px;
      padding: 14px 20px;
      flex: 1;
      min-width: 180px;
      border-left: 4px solid #1a3a5c;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .summary-card.green { border-color: #27ae60; }
    .summary-card.red { border-color: #c0392b; }
    .summary-card.purple { border-color: #8e44ad; }
    .summary-card .label { font-size: 0.78rem; color: #777; text-transform: uppercase; letter-spacing: 0.5px; }
    .summary-card .value { font-size: 1.3rem; font-weight: 700; margin-top: 4px; }
    .summary-card .sub { font-size: 0.75rem; color: #999; margin-top: 2px; }

    .table-wrapper {
      padding: 0 24px 24px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.85rem;
    }
    thead { background: #1a3a5c; color: white; }
    th { padding: 10px 12px; text-align: left; white-space: nowrap; cursor: pointer; user-select: none; }
    th:hover { background: #254d7a; }
    th.sorted-asc::after { content: ' ↑'; }
    th.sorted-desc::after { content: ' ↓'; }
    td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .positive { color: #27ae60; font-weight: 600; }
    .negative { color: #c0392b; font-weight: 600; }
    .neutral { color: #555; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-accionario { background: #e8f5e9; color: #2e7d32; }
    .badge-deuda { background: #e3f2fd; color: #1565c0; }
    .badge-balanceado { background: #fff3e0; color: #e65100; }
    .badge-other { background: #f5f5f5; color: #555; }

    .empty { text-align: center; padding: 40px; color: #999; }

    .totals-row td { font-weight: 700; background: #f0f4f8; border-top: 2px solid #ccc; }

    .filter-group { display: flex; align-items: center; gap: 8px; }

    footer { text-align: center; padding: 16px; color: #999; font-size: 0.78rem; }
    footer a { color: #1a3a5c; }
  </style>
</head>
<body>

<header>
  <h1>Aportes y Rescates — Fondos Mutuos Chile</h1>
  <a href="https://estadisticas2.aafm.cl/DailyStadistics" target="_blank" rel="noopener">
    Fuente: AAFM.cl ↗
  </a>
</header>

<div class="controls">
  <div class="filter-group">
    <label for="dateInput">Fecha:</label>
    <input type="date" id="dateInput" />
  </div>

  <div class="filter-group">
    <label for="categoryFilter">Categoría:</label>
    <select id="categoryFilter">
      <option value="">Todas</option>
      <option value="Accionario" selected>Solo Accionarios</option>
      <option value="Deuda">Solo Deuda</option>
      <option value="Balanceado">Balanceados</option>
    </select>
  </div>

  <div class="filter-group">
    <label for="searchInput">Buscar fondo:</label>
    <input type="text" id="searchInput" placeholder="Nombre o administradora..." />
  </div>

  <button class="btn-primary" onclick="loadData()">Consultar</button>
  <button class="btn-warning" onclick="refreshData()">Forzar actualización</button>
  <button class="btn-secondary" onclick="clearSearch()">Limpiar filtros</button>
</div>

<div class="status-bar" id="statusBar">Selecciona una fecha y presiona Consultar.</div>

<div class="summary" id="summary" style="display:none"></div>

<div class="table-wrapper">
  <table id="dataTable">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"><tr><td class="empty" colspan="20">Aún no se han cargado datos.</td></tr></tbody>
  </table>
</div>

<footer>
  Datos obtenidos desde
  <a href="https://estadisticas2.aafm.cl/DailyStadistics" target="_blank" rel="noopener">AAFM — Asociación de Fondos Mutuos</a>
</footer>

<script>
  // --- Config ---
  const API = '';  // same origin

  // Sort state
  let sortCol = null;
  let sortDir = 1;
  let allRows = [];
  let headers = [];

  // --- Init ---
  (function init() {
    const yesterday = getYesterday();
    document.getElementById('dateInput').value = yesterday;
    document.getElementById('dateInput').max = yesterday;
    loadData();
  })();

  function getYesterday() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().split('T')[0];
  }

  // --- Data loading ---
  async function loadData() {
    const date = document.getElementById('dateInput').value;
    if (!date) return alert('Selecciona una fecha');
    setStatus('Cargando datos...', 'loading');

    try {
      const res = await fetch(`${API}/api/daily?date=${date}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);

      headers = json.headers || [];
      allRows = json.rows || [];

      const src = json.source === 'cache'
        ? `Datos en caché (obtenidos el ${formatDateTime(json.fetched_at)})`
        : `Datos frescos de AAFM (${formatDateTime(json.fetched_at)})`;
      setStatus(`${allRows.length} fondos encontrados. ${src}`);

      renderTable();
    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    }
  }

  async function refreshData() {
    const date = document.getElementById('dateInput').value;
    if (!date) return alert('Selecciona una fecha');
    setStatus('Forzando actualización desde AAFM (puede tardar ~30 segundos)...', 'loading');

    try {
      const res = await fetch(`${API}/api/refresh?date=${date}`, { method: 'POST' });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
      const json = await res.json();
      if (json.error) throw new Error(json.error);

      headers = json.headers || [];
      allRows = json.rows || [];
      setStatus(`Datos actualizados: ${allRows.length} fondos. Fuente: AAFM`);
      renderTable();
    } catch (err) {
      setStatus(`Error: ${err.message}`, 'error');
    }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    document.getElementById('categoryFilter').value = '';
    renderTable();
  }

  // --- Render ---
  function getFilteredRows() {
    const cat = document.getElementById('categoryFilter').value.toLowerCase();
    const search = document.getElementById('searchInput').value.toLowerCase();

    return allRows.filter((row) => {
      const rowText = Object.values(row).join(' ').toLowerCase();
      if (cat && !rowText.includes(cat)) return false;
      if (search && !rowText.includes(search)) return false;
      return true;
    });
  }

  function renderTable() {
    const rows = getSortedRows(getFilteredRows());
    renderSummary(rows);
    renderHeaders();
    renderBody(rows);
  }

  function renderHeaders() {
    const thead = document.getElementById('tableHead');
    if (!headers.length) { thead.innerHTML = ''; return; }
    const extraCols = ['Flujo Neto'];
    const allCols = [...headers, ...extraCols];
    thead.innerHTML = `<tr>${allCols.map((h, i) => {
      let cls = '';
      if (sortCol === i) cls = sortDir > 0 ? 'sorted-asc' : 'sorted-desc';
      return `<th class="${cls}" onclick="sortBy(${i})">${h}</th>`;
    }).join('')}</tr>`;
  }

  function renderBody(rows) {
    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td class="empty" colspan="20">No hay datos para los filtros seleccionados.</td></tr>';
      return;
    }

    const aportesKey = findKey(headers, ['aporte', 'contributed', 'flujo aporte']);
    const rescatesKey = findKey(headers, ['rescate', 'rescued', 'flujo rescate']);

    const html = rows.map((row) => {
      const aporte = parseNum(row[aportesKey]);
      const rescate = parseNum(row[rescatesKey]);
      const neto = aporte - rescate;

      const cells = headers.map((h) => {
        const val = row[h] || '';
        if (h.toLowerCase().includes('categoría') || h.toLowerCase().includes('categoria')) {
          return `<td>${categoryBadge(val)}</td>`;
        }
        if (h === aportesKey) return `<td class="positive">${val}</td>`;
        if (h === rescatesKey) return `<td class="negative">${val}</td>`;
        return `<td>${val}</td>`;
      }).join('');

      const netoCls = neto >= 0 ? 'positive' : 'negative';
      const netoStr = neto !== 0 ? formatNum(neto) : '-';
      return `<tr>${cells}<td class="${netoCls}">${netoStr}</td></tr>`;
    }).join('');

    // Totals row
    const aportesKey2 = aportesKey;
    const rescatesKey2 = rescatesKey;
    const totAporte = rows.reduce((s, r) => s + parseNum(r[aportesKey2]), 0);
    const totRescate = rows.reduce((s, r) => s + parseNum(r[rescatesKey2]), 0);
    const totNeto = totAporte - totRescate;
    const totNetoCls = totNeto >= 0 ? 'positive' : 'negative';
    const totalCells = headers.map((h, i) => {
      if (i === 0) return `<td><strong>TOTAL (${rows.length} fondos)</strong></td>`;
      if (h === aportesKey2) return `<td class="positive"><strong>${formatNum(totAporte)}</strong></td>`;
      if (h === rescatesKey2) return `<td class="negative"><strong>${formatNum(totRescate)}</strong></td>`;
      return '<td></td>';
    }).join('');

    tbody.innerHTML = html + `<tr class="totals-row">${totalCells}<td class="${totNetoCls}"><strong>${formatNum(totNeto)}</strong></td></tr>`;
  }

  function renderSummary(rows) {
    const summary = document.getElementById('summary');
    const aportesKey = findKey(headers, ['aporte', 'contributed', 'flujo aporte']);
    const rescatesKey = findKey(headers, ['rescate', 'rescued', 'flujo rescate']);

    const totAporte = rows.reduce((s, r) => s + parseNum(r[aportesKey]), 0);
    const totRescate = rows.reduce((s, r) => s + parseNum(r[rescatesKey]), 0);
    const totNeto = totAporte - totRescate;

    summary.style.display = 'flex';
    summary.innerHTML = `
      <div class="summary-card green">
        <div class="label">Total Aportes</div>
        <div class="value">${formatNum(totAporte)}</div>
        <div class="sub">${rows.length} fondos</div>
      </div>
      <div class="summary-card red">
        <div class="label">Total Rescates</div>
        <div class="value">${formatNum(totRescate)}</div>
        <div class="sub">MM CLP</div>
      </div>
      <div class="summary-card ${totNeto >= 0 ? '' : 'red'} purple">
        <div class="label">Flujo Neto</div>
        <div class="value ${totNeto >= 0 ? 'positive' : 'negative'}">${formatNum(totNeto)}</div>
        <div class="sub">${totNeto >= 0 ? 'Entrada neta' : 'Salida neta'}</div>
      </div>
    `;
  }

  // --- Sorting ---
  function sortBy(colIdx) {
    if (sortCol === colIdx) {
      sortDir *= -1;
    } else {
      sortCol = colIdx;
      sortDir = 1;
    }
    renderTable();
  }

  function getSortedRows(rows) {
    if (sortCol === null) return rows;
    const allCols = [...headers, 'Flujo Neto'];
    const key = allCols[sortCol];
    const aportesKey = findKey(headers, ['aporte', 'contributed', 'flujo aporte']);
    const rescatesKey = findKey(headers, ['rescate', 'rescued', 'flujo rescate']);

    return [...rows].sort((a, b) => {
      let av, bv;
      if (key === 'Flujo Neto') {
        av = parseNum(a[aportesKey]) - parseNum(a[rescatesKey]);
        bv = parseNum(b[aportesKey]) - parseNum(b[rescatesKey]);
      } else {
        av = parseNum(a[key]) || a[key] || '';
        bv = parseNum(b[key]) || b[key] || '';
      }
      if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sortDir;
      return String(av).localeCompare(String(bv)) * sortDir;
    });
  }

  // --- Helpers ---
  function findKey(keys, candidates) {
    for (const k of keys) {
      for (const c of candidates) {
        if (k.toLowerCase().includes(c)) return k;
      }
    }
    return keys[0] || '';
  }

  function parseNum(val) {
    if (!val) return 0;
    const n = parseFloat(String(val).replace(/\./g, '').replace(',', '.').replace(/[^0-9.-]/g, ''));
    return isNaN(n) ? 0 : n;
  }

  function formatNum(n) {
    if (n === 0) return '0';
    return n.toLocaleString('es-CL', { maximumFractionDigits: 2 });
  }

  function formatDateTime(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' });
  }

  function categoryBadge(val) {
    const v = (val || '').toLowerCase();
    let cls = 'badge-other';
    if (v.includes('accionario')) cls = 'badge-accionario';
    else if (v.includes('deuda')) cls = 'badge-deuda';
    else if (v.includes('balanceado')) cls = 'badge-balanceado';
    return `<span class="badge ${cls}">${val}</span>`;
  }

  function setStatus(msg, type = '') {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = 'status-bar' + (type ? ` ${type}` : '');
  }

  // Re-render on filter change
  document.getElementById('categoryFilter').addEventListener('change', renderTable);
  document.getElementById('searchInput').addEventListener('input', renderTable);
  document.getElementById('dateInput').addEventListener('change', loadData);
</script>
</body>
</html>
