<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Aportes y Rescates — FFMM Accionario Nacional</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#222;font-size:14px}

    header{background:#1b3a6b;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
    header h1{font-size:1.1rem;font-weight:600;flex:1}
    header a{color:#a8c8f0;font-size:.8rem;text-decoration:none}
    header a:hover{color:#fff}

    .tabs{display:flex;background:#fff;border-bottom:2px solid #dde3ed;padding:0 20px}
    .tab{padding:10px 20px;cursor:pointer;font-weight:500;color:#666;border-bottom:3px solid transparent;margin-bottom:-2px;transition:.15s}
    .tab.active{color:#1b3a6b;border-color:#1b3a6b}

    .controls{background:#fff;padding:12px 20px;border-bottom:1px solid #e0e5ed;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
    .ctrl-group{display:flex;flex-direction:column;gap:4px}
    .ctrl-group label{font-size:.78rem;color:#666;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
    input[type=date]{padding:6px 10px;border:1px solid #ccc;border-radius:5px;font-size:.88rem}
    .cat-checks{display:flex;flex-direction:column;gap:3px}
    .cat-checks label{display:flex;align-items:center;gap:6px;font-size:.82rem;cursor:pointer}
    .cat-checks input[type=checkbox]{accent-color:#1b3a6b;width:14px;height:14px}
    button{padding:7px 16px;border:none;border-radius:5px;cursor:pointer;font-size:.85rem;font-weight:500;white-space:nowrap}
    .btn-primary{background:#1b3a6b;color:#fff}.btn-primary:hover{background:#254e8e}
    .btn-green{background:#27ae60;color:#fff}.btn-green:hover{background:#229954}
    .btn-orange{background:#e67e22;color:#fff}.btn-orange:hover{background:#ca6f1e}
    .btn-gray{background:#e0e5ed;color:#444}.btn-gray:hover{background:#ccd3de}

    .status{padding:7px 20px;background:#eaf3fb;border-bottom:1px solid #c8dff5;font-size:.8rem;color:#555;min-height:30px}
    .status.loading{background:#fff8e1;border-color:#ffe082}
    .status.error{background:#fdecea;border-color:#f5c6cb;color:#c0392b}

    .page{display:none;padding:16px 20px 24px}
    .page.active{display:block}

    /* --- CARDS --- */
    .cards{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .card{background:#fff;border-radius:8px;padding:14px 18px;flex:1;min-width:160px;border-left:4px solid #1b3a6b;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .card.green{border-color:#27ae60}.card.red{border-color:#c0392b}.card.blue{border-color:#2980b9}
    .card .lbl{font-size:.72rem;color:#888;text-transform:uppercase;letter-spacing:.4px}
    .card .val{font-size:1.35rem;font-weight:700;margin-top:3px}
    .card .sub{font-size:.72rem;color:#aaa;margin-top:2px}
    .positive{color:#27ae60}.negative{color:#c0392b}

    /* --- CHART --- */
    .chart-box{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
    .chart-box h3{font-size:.9rem;color:#444;margin-bottom:12px;font-weight:600}
    .chart-wrap{position:relative;height:260px}
    .chart-legend{display:flex;gap:16px;margin-top:8px;justify-content:center;font-size:.78rem;color:#666}
    .chart-legend span{display:flex;align-items:center;gap:5px}
    .dot{width:12px;height:12px;border-radius:50%;display:inline-block}

    /* --- TABLE --- */
    .table-wrap{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden}
    .table-toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #eee;flex-wrap:wrap}
    .table-toolbar input{padding:5px 10px;border:1px solid #ccc;border-radius:5px;font-size:.83rem;width:220px}
    .table-scroll{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:.82rem}
    thead{background:#1b3a6b;color:#fff;position:sticky;top:0}
    th{padding:9px 12px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none}
    th:hover{background:#254e8e}
    th.asc::after{content:' ↑'}th.desc::after{content:' ↓'}
    td{padding:7px 12px;border-bottom:1px solid #f2f4f8;white-space:nowrap}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#f8fafc}
    .tfoot td{font-weight:700;background:#edf1f7;border-top:2px solid #ccc}

    .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72rem;font-weight:600;background:#e8f5e9;color:#2e7d32}
    .empty-msg{text-align:center;padding:32px;color:#aaa}

    /* Monthly progress */
    .month-progress{background:#fff;border-radius:8px;padding:14px 18px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .month-progress h3{font-size:.88rem;color:#444;margin-bottom:8px;font-weight:600}
    .days-grid{display:flex;flex-wrap:wrap;gap:4px}
    .day-chip{padding:3px 8px;border-radius:4px;font-size:.72rem;font-weight:500}
    .day-chip.loaded{background:#e8f5e9;color:#2e7d32}
    .day-chip.loading{background:#fff3cd;color:#856404}
    .day-chip.pending{background:#f0f2f5;color:#999}

    footer{text-align:center;padding:12px;color:#aaa;font-size:.75rem}
    footer a{color:#1b3a6b}
  </style>
</head>
<body>

<header>
  <h1>Aportes y Rescates — FFMM Accionario Nacional</h1>
  <a href="https://estadisticas2.aafm.cl/DailyStadistics" target="_blank" rel="noopener">Fuente: AAFM ↗</a>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('diario')">Diario</div>
  <div class="tab" onclick="showTab('mensual')">Acumulado Mensual</div>
</div>

<div class="controls">
  <div class="ctrl-group">
    <label>Fecha</label>
    <input type="date" id="dateInput"/>
  </div>
  <div class="ctrl-group">
    <label>Categorías AFM</label>
    <div class="cat-checks" id="catChecks"></div>
  </div>
  <div class="ctrl-group" style="justify-content:flex-end;margin-top:auto;gap:6px;display:flex;flex-direction:row;align-items:flex-end">
    <button class="btn-primary" onclick="loadDay()">Consultar</button>
    <button class="btn-orange" onclick="refreshDay()">Actualizar</button>
    <button class="btn-green" onclick="downloadExcel()">⬇ Excel</button>
  </div>
</div>

<div class="status" id="status">Cargando datos...</div>

<!-- TAB: DIARIO -->
<div class="page active" id="page-diario">
  <div class="cards" id="cards"></div>
  <div class="table-wrap">
    <div class="table-toolbar">
      <input type="text" id="searchBox" placeholder="Buscar fondo o administradora..." oninput="renderTable()"/>
      <span id="rowCount" style="color:#888;font-size:.8rem"></span>
    </div>
    <div class="table-scroll">
      <table id="mainTable">
        <thead id="thead"></thead>
        <tbody id="tbody"><tr><td class="empty-msg" colspan="20">Presiona Consultar para cargar datos.</td></tr></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
  </div>
</div>

<!-- TAB: MENSUAL -->
<div class="page" id="page-mensual">
  <div class="cards" id="monthCards"></div>
  <div class="chart-box">
    <h3 id="chartTitle">Flujo Neto Acumulado — mes actual</h3>
    <div class="chart-wrap"><canvas id="myChart"></canvas></div>
    <div class="chart-legend">
      <span><span class="dot" style="background:#27ae60"></span>Flujo neto diario positivo</span>
      <span><span class="dot" style="background:#c0392b"></span>Flujo neto diario negativo</span>
      <span><span class="dot" style="background:#1b3a6b"></span>Acumulado</span>
    </div>
  </div>
  <div class="month-progress">
    <h3>Días cargados</h3>
    <div class="days-grid" id="daysGrid"></div>
  </div>
</div>

<footer>Datos desde <a href="https://estadisticas2.aafm.cl/DailyStadistics" target="_blank">AAFM.cl</a></footer>

<script>
// ─── Config ────────────────────────────────────────────────────────────────
const DEFAULT_CATS = [
  'Accionario Nacional',
  'Accionario Nacional Large Cap',
  'Accionario Nacional Otros',
  'Accionario Nacional Small & Mid Cap',
  'Inversionistas Calificados Accionario Nacional',
];

// ─── State ─────────────────────────────────────────────────────────────────
let allRows = [], headers = [];
let sortCol = null, sortDir = 1;
let chart = null;
let monthData = []; // [{ date, loaded, aportes, rescates, netFlow }]

// ─── Init ──────────────────────────────────────────────────────────────────
(function init() {
  // Build category checkboxes
  const wrap = document.getElementById('catChecks');
  DEFAULT_CATS.forEach(cat => {
    const id = 'cat_' + cat.replace(/\s+/g, '_');
    wrap.innerHTML += `<label><input type="checkbox" id="${id}" value="${cat}" checked onchange="renderTable();buildMonthChart()"> ${cat}</label>`;
  });

  const yesterday = isoDate(-1);
  const input = document.getElementById('dateInput');
  input.value = yesterday;
  input.max = yesterday;
  input.addEventListener('change', loadDay);

  loadDay();
  loadMonthly();
})();

// ─── Tabs ──────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['diario','mensual'][i] === name));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (name === 'mensual' && monthData.length === 0) loadMonthly();
}

// ─── Daily data ────────────────────────────────────────────────────────────
async function loadDay() {
  const date = document.getElementById('dateInput').value;
  setStatus('Cargando datos para ' + date + '…', 'loading');
  try {
    const d = await apiFetch('/api/daily?date=' + date);
    headers = d.headers || [];
    allRows = d.rows || [];
    setStatus(allRows.length + ' fondos cargados. Fuente: ' + (d.source === 'cache' ? 'caché' : 'AAFM') + ' (' + fmtDateTime(d.fetched_at) + ')');
    renderTable();
    renderCards();
  } catch(e) { setStatus('Error: ' + e.message, 'error'); }
}

async function refreshDay() {
  const date = document.getElementById('dateInput').value;
  setStatus('Actualizando desde AAFM…', 'loading');
  try {
    const d = await apiFetch('/api/refresh?date=' + date, { method: 'POST' });
    headers = d.headers || [];
    allRows = d.rows || [];
    setStatus(allRows.length + ' fondos actualizados desde AAFM.');
    renderTable();
    renderCards();
    loadMonthly(); // refresh monthly too
  } catch(e) { setStatus('Error: ' + e.message, 'error'); }
}

// ─── Render table ──────────────────────────────────────────────────────────
function getSelectedCats() {
  return DEFAULT_CATS.filter(cat => {
    const el = document.getElementById('cat_' + cat.replace(/\s+/g, '_'));
    return el && el.checked;
  });
}

function getFilteredRows() {
  const cats = getSelectedCats();
  const q = document.getElementById('searchBox').value.toLowerCase();
  return allRows.filter(r => {
    if (!cats.includes(r['Categoría AFM'] || '')) return false;
    if (q) {
      const text = [r['Administradora'], r['Fondo'], r['Serie']].join(' ').toLowerCase();
      if (!text.includes(q)) return false;
    }
    return true;
  });
}

function renderTable() {
  const rows = sorted(getFilteredRows());
  renderThead();
  renderTbody(rows);
  renderTfoot(rows);
  renderCards();
  document.getElementById('rowCount').textContent = rows.length + ' fondos';
}

const AKEY = () => headers.find(h => h.includes('Flujo Aporte'))  || '';
const RKEY = () => headers.find(h => h.includes('Flujo Rescate')) || '';
const PKEY = () => headers.find(h => h.includes('Patrimonio neto')) || '';

function renderThead() {
  const extra = ['Flujo Neto ($)'];
  const cols = [...headers, ...extra];
  document.getElementById('thead').innerHTML = '<tr>' + cols.map((h, i) => {
    let cls = sortCol === i ? (sortDir > 0 ? 'asc' : 'desc') : '';
    return `<th class="${cls}" onclick="sortBy(${i})">${h}</th>`;
  }).join('') + '</tr>';
}

function renderTbody(rows) {
  const ak = AKEY(), rk = RKEY();
  if (!rows.length) {
    document.getElementById('tbody').innerHTML = '<tr><td class="empty-msg" colspan="30">Sin resultados para los filtros seleccionados.</td></tr>';
    return;
  }
  const html = rows.map(r => {
    const a = parseNum(r[ak]), rv = parseNum(r[rk]);
    const net = a - rv;
    const cells = headers.map(h => {
      const v = r[h] || '';
      if (h === 'Categoría AFM') return `<td><span class="badge">${v}</span></td>`;
      if (h === ak) return `<td class="positive">${v}</td>`;
      if (h === rk) return `<td class="negative">${v}</td>`;
      return `<td>${v}</td>`;
    }).join('');
    const netCls = net >= 0 ? 'positive' : 'negative';
    return `<tr>${cells}<td class="${netCls}">${fmtCLP(net)}</td></tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML = html;
}

function renderTfoot(rows) {
  const ak = AKEY(), rk = RKEY();
  const totA = rows.reduce((s, r) => s + parseNum(r[ak]), 0);
  const totR = rows.reduce((s, r) => s + parseNum(r[rk]), 0);
  const totN = totA - totR;
  const cells = headers.map((h, i) => {
    if (i === 0) return `<td>TOTAL (${rows.length} fondos)</td>`;
    if (h === ak) return `<td class="positive">${fmtCLP(totA)}</td>`;
    if (h === rk) return `<td class="negative">${fmtCLP(totR)}</td>`;
    return '<td></td>';
  }).join('');
  document.getElementById('tfoot').innerHTML = `<tr class="tfoot">${cells}<td class="${totN >= 0 ? 'positive' : 'negative'}">${fmtCLP(totN)}</td></tr>`;
}

function renderCards() {
  const rows = getFilteredRows();
  const ak = AKEY(), rk = RKEY(), pk = PKEY();
  const totA = rows.reduce((s, r) => s + parseNum(r[ak]), 0);
  const totR = rows.reduce((s, r) => s + parseNum(r[rk]), 0);
  const totP = rows.reduce((s, r) => s + parseNum(r[pk]), 0);
  const net = totA - totR;
  document.getElementById('cards').innerHTML = `
    <div class="card green"><div class="lbl">Aportes</div><div class="val">${fmtMM(totA)}</div><div class="sub">MM CLP — ${rows.length} fondos</div></div>
    <div class="card red"><div class="lbl">Rescates</div><div class="val">${fmtMM(totR)}</div><div class="sub">MM CLP</div></div>
    <div class="card ${net >= 0 ? '' : 'red'}"><div class="lbl">Flujo Neto</div><div class="val ${net >= 0 ? 'positive' : 'negative'}">${fmtMM(net)}</div><div class="sub">${net >= 0 ? 'Entrada neta' : 'Salida neta'}</div></div>
    <div class="card blue"><div class="lbl">Patrimonio Neto</div><div class="val">${fmtMM(totP)}</div><div class="sub">MM CLP total</div></div>
  `;
}

// ─── Sort ──────────────────────────────────────────────────────────────────
function sortBy(i) {
  if (sortCol === i) sortDir *= -1; else { sortCol = i; sortDir = 1; }
  renderTable();
}
function sorted(rows) {
  if (sortCol === null) return rows;
  const allCols = [...headers, 'Flujo Neto ($)'];
  const key = allCols[sortCol];
  const ak = AKEY(), rk = RKEY();
  return [...rows].sort((a, b) => {
    let av, bv;
    if (key === 'Flujo Neto ($)') {
      av = parseNum(a[ak]) - parseNum(a[rk]);
      bv = parseNum(b[ak]) - parseNum(b[rk]);
    } else {
      av = parseNum(a[key]);
      bv = parseNum(b[key]);
      if (!av && !bv) { av = a[key] || ''; bv = b[key] || ''; }
    }
    if (typeof av === 'number' && typeof bv === 'number') return (av - bv) * sortDir;
    return String(av).localeCompare(String(bv), 'es') * sortDir;
  });
}

// ─── Monthly chart ─────────────────────────────────────────────────────────
async function loadMonthly() {
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + 1;
  const cats = getSelectedCats().join('|');
  try {
    const data = await apiFetch(`/api/monthly-summary?year=${y}&month=${m}&cats=${encodeURIComponent(cats)}`);
    monthData = data;
    renderDaysGrid();
    buildMonthChart();
    // Fetch uncached days one by one
    fetchMissingDays(data.filter(d => !d.loaded).map(d => d.date), y, m, cats);
  } catch(e) { console.error('monthly error', e); }
}

async function fetchMissingDays(dates, y, m, cats) {
  for (const date of dates) {
    try {
      setStatus(`Cargando historial: ${date}…`, 'loading');
      await apiFetch('/api/daily?date=' + date);
      // Re-fetch monthly summary
      const data = await apiFetch(`/api/monthly-summary?year=${y}&month=${m}&cats=${encodeURIComponent(cats)}`);
      monthData = data;
      renderDaysGrid();
      buildMonthChart();
    } catch(e) { /* skip */ }
  }
  setStatus('Historial mensual completo.');
}

function buildMonthChart() {
  const cats = getSelectedCats();
  // Re-aggregate with current category selection using cached monthData
  // For now use whatever the server returned — update on cat change by reloading
  const loaded = monthData.filter(d => d.loaded);
  if (!loaded.length) return;

  const labels = loaded.map(d => d.date.slice(5)); // MM-DD
  const nets = loaded.map(d => d.netFlow || 0);
  const cumulative = nets.reduce((acc, v) => { acc.push((acc[acc.length-1] || 0) + v); return acc; }, []);

  const barColors = nets.map(v => v >= 0 ? 'rgba(39,174,96,.7)' : 'rgba(192,57,43,.7)');

  const now = new Date();
  document.getElementById('chartTitle').textContent =
    `Flujo Neto Acumulado — ${now.toLocaleString('es-CL', { month: 'long', year: 'numeric' })}`;

  // Update month summary cards
  const totA = loaded.reduce((s, d) => s + (d.aportes || 0), 0);
  const totR = loaded.reduce((s, d) => s + (d.rescates || 0), 0);
  const totN = totA - totR;
  document.getElementById('monthCards').innerHTML = `
    <div class="card green"><div class="lbl">Aportes acumulados</div><div class="val">${fmtMM(totA)}</div><div class="sub">MM CLP — ${loaded.length} días</div></div>
    <div class="card red"><div class="lbl">Rescates acumulados</div><div class="val">${fmtMM(totR)}</div><div class="sub">MM CLP</div></div>
    <div class="card ${totN >= 0 ? '' : 'red'}"><div class="lbl">Neto acumulado</div><div class="val ${totN >= 0 ? 'positive' : 'negative'}">${fmtMM(totN)}</div><div class="sub">${totN >= 0 ? 'Entrada neta' : 'Salida neta'} del mes</div></div>
  `;

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById('myChart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: 'Flujo Neto Diario (MM CLP)',
          data: nets.map(v => v / 1e6),
          backgroundColor: barColors,
          yAxisID: 'yBar',
          order: 2,
        },
        {
          type: 'line',
          label: 'Acumulado (MM CLP)',
          data: cumulative.map(v => v / 1e6),
          borderColor: '#1b3a6b',
          backgroundColor: 'rgba(27,58,107,.08)',
          borderWidth: 2.5,
          pointRadius: 3,
          fill: true,
          tension: .3,
          yAxisID: 'yLine',
          order: 1,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index' },
      plugins: { legend: { display: false }, tooltip: {
        callbacks: {
          label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y.toLocaleString('es-CL', { minimumFractionDigits: 1 }) + ' MM'
        }
      }},
      scales: {
        yBar: { type: 'linear', position: 'right', grid: { display: false }, ticks: { callback: v => v.toLocaleString('es-CL') + ' MM' } },
        yLine: { type: 'linear', position: 'left', ticks: { callback: v => v.toLocaleString('es-CL') + ' MM' } },
        x: { grid: { display: false } },
      },
    },
  });
}

function renderDaysGrid() {
  document.getElementById('daysGrid').innerHTML = monthData.map(d =>
    `<span class="day-chip ${d.loaded ? 'loaded' : 'pending'}">${d.date.slice(5)}</span>`
  ).join('');
}

// ─── Excel download ────────────────────────────────────────────────────────
function downloadExcel() {
  const rows = getFilteredRows();
  if (!rows.length) return alert('No hay datos para descargar.');
  const ak = AKEY(), rk = RKEY();
  const exportRows = rows.map(r => {
    const a = parseNum(r[ak]), rv = parseNum(r[rk]);
    return { ...r, 'Flujo Neto ($)': a - rv };
  });
  const ws = XLSX.utils.json_to_sheet(exportRows, { header: [...headers, 'Flujo Neto ($)'] });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'FFMM Accionario Nacional');
  const date = document.getElementById('dateInput').value;
  XLSX.writeFile(wb, `FFMM_Accionario_Nacional_${date}.xlsx`);
}

// ─── Helpers ───────────────────────────────────────────────────────────────
async function apiFetch(url, opts = {}) {
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

function parseNum(v) {
  if (!v || v === '-') return 0;
  return parseFloat(String(v).replace(/\./g, '').replace(',', '.')) || 0;
}
function fmtCLP(n) { return n.toLocaleString('es-CL', { maximumFractionDigits: 0 }); }
function fmtMM(n) { return (n / 1e6).toLocaleString('es-CL', { minimumFractionDigits: 1, maximumFractionDigits: 1 }); }
function fmtDateTime(iso) { if (!iso) return ''; return new Date(iso).toLocaleString('es-CL', { dateStyle: 'short', timeStyle: 'short' }); }
function isoDate(offset = 0) { const d = new Date(); d.setDate(d.getDate() + offset); return d.toISOString().split('T')[0]; }
function setStatus(msg, type = '') { const b = document.getElementById('status'); b.textContent = msg; b.className = 'status' + (type ? ' ' + type : ''); }
</script>
</body>
</html>
